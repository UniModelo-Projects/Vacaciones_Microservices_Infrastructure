version: '3.8'

services:
  eureka-server:
    build: ../Vacaciones_Microservices_Eureka_Server
    ports:
      - "8761:8761"
    networks:
      - microservices-net

  api-gateway:
    build: ../Vacaciones_Microservices_API_Gateway
    ports:
      - "8080:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    depends_on:
      - eureka-server
    networks:
      - microservices-net

  product-service:
    build: ../Vacaciones_Microservices_Products
    ports:
      - "8081:8081"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/productos
      - KAFKA_BROKERS=kafka:29092
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    depends_on:
      - eureka-server
      - mongodb
      - localstack
      - kafka
    networks:
      - microservices-net

  order-service:
    build: ../Vacaciones_Microservices_Orders
    ports:
      - "8082:8082"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/ordenes
      - KAFKA_BROKERS=kafka:29092
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    depends_on:
      - eureka-server
      - mongodb
      - localstack
      - kafka
    networks:
      - microservices-net

  payment-service:
    build: ../Vacaciones_Microservices_Payments
    ports:
      - "8083:8083"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/pagos
      - KAFKA_BROKERS=kafka:29092
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    depends_on:
      - eureka-server
      - mongodb
      - localstack
      - kafka
    networks:
      - microservices-net

  broker-service:
    build: ../Vacaciones_Microservices_Broker
    ports:
      - "8084:8084"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=broker_db
      - DB_USER=user
      - DB_PASS=password
      - MONGO_URI=mongodb://mongodb:27017/broker_final_db
      - KAFKA_BROKERS=kafka:29092
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
    depends_on:
      - eureka-server
      - postgres
      - mongodb
      - kafka
    networks:
      - microservices-net

  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=broker_db
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    networks:
      - microservices-net

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    networks:
      - microservices-net

  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      - SERVICES=logs,cloudwatch
      - DEFAULT_REGION=us-east-1
    volumes:
      - "./localstack-init:/etc/localstack/init/ready.d"
    networks:
      - microservices-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - microservices-net

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - microservices-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8086:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      - kafka
    networks:
      - microservices-net

networks:
  microservices-net:
    driver: bridge
